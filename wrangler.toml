name = "jdm-vehicle-finder"
main = "src/index.js"
compatibility_date = "2024-11-01"
# Cloudflare account that owns this Worker and the jdmconnect.com.au zone.
account_id = "78a4648f57e3da163587fff349bf8b19"
# Keep the *.workers.dev URL alive as a fallback alongside the custom domain.
workers_dev = true

# Custom domain. The jdmconnect.com.au zone is now in this same Cloudflare account,
# so Cloudflare auto-creates the DNS record + cert and routes it to this Worker.
[[routes]]
pattern = "finder.jdmconnect.com.au"
custom_domain = true

# Runs the matcher automatically. Default: 4x per day (every 6 hours).
# Adjust once the provider confirms rate limits. Times are UTC.
[triggers]
crons = ["0 */6 * * *"]

# D1 database binding. Create it with:
#   npx wrangler d1 create jdm-vehicle-finder
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "jdm-vehicle-finder"
database_id = "2396671f-a3b6-4a33-bd9b-2b9fee37e0c2"
# Schema changes are versioned under migrations/ and applied with
# `wrangler d1 migrations apply`. See migrations/README.md. Production is already
# at 0001_baseline; apply new migrations to prod only with explicit approval.
migrations_dir = "migrations"

# Per-IP rate limiting for the public request form (shared RL namespace).
[[kv_namespaces]]
binding = "RL"
id = "0ba8ff47c4c646eda3ddf9df57212641"

[vars]
# AVTONET SQL API base. The documented gateway. Override if the provider gives a new host.
# Points at your relay (on your own web host), which forwards to the auction
# API from an allowed IP. The Worker sends ?code=<relay token>&sql=...
API_BASE = "https://jdmconnect.com.au/jdm-relay.php"
# Email address that receives the internal approval digest (you).
DIGEST_EMAIL = "support@jdmconnect.com.au"
# Verified sender addresses (jdmconnect.com.au verified in Resend).
# Internal review digest goes out as matches@, client emails as hello@. Both are
# proven-deliverable Resend senders. (matches@ mail reaching the matches@ shared
# mailbox was fixed in Exchange: the "Catch all" transport rule now excepts matches@.)
MAIL_FROM_INTERNAL = "matches@jdmconnect.com.au"
MAIL_FROM_CLIENT = "hello@jdmconnect.com.au"
# Public URL of this Worker once deployed (used to build approve/reject links).
# e.g. https://jdm-vehicle-finder.<your-subdomain>.workers.dev
PUBLIC_URL = "https://finder.jdmconnect.com.au"

# Landed-cost estimate — the finder reuses the live calculator at
# calculator.jdmconnect.com.au/api/calc so numbers always match. These are the
# ASSUMPTIONS fed to it for the indicative estimate; tune to your real figures.
#   CALC_FX          JPY per A$1 (the calculator's default is 95)
#   CALC_COMPLIANCE  your typical SEVS/RAWS compliance cost (confirmed: $2,500)
#   CALC_AGENCY      your service fee; leave 0 to show pure landed cost
#   CALC_DEFAULT_STATE used when a client has no state set
CALC_API = "https://calculator.jdmconnect.com.au/api/calc"
CALC_ORIGIN = "https://jdmconnect.com.au"
CALC_FX = "95"
CALC_COMPLIANCE = "2500"
CALC_AGENCY = "0"
CALC_DEFAULT_STATE = "VIC"

# Secrets are NOT stored here. Set them with `wrangler secret put`:
#   AVTONET_CODE         -> your auction API password (set via the command above; not stored here)
#   RESEND_API_KEY       -> from resend.com
#   ADMIN_TOKEN          -> any long random string; gates the admin page
#   ADMIN_PASSWORD       -> optional separate admin login password (else ADMIN_TOKEN works)
#   STRIPE_SECRET_KEY    -> Stripe secret key (sk_live_... / sk_test_...) for buyer deposits
#   STRIPE_WEBHOOK_SECRET-> signing secret (whsec_...) for the /webhooks/stripe endpoint
#
# Stripe setup (once STRIPE_SECRET_KEY is set):
#   1) Stripe Dashboard -> Developers -> Webhooks -> Add endpoint
#      URL:   https://finder.jdmconnect.com.au/webhooks/stripe
#      Event: checkout.session.completed
#   2) Copy the endpoint's signing secret and run:
#        npx wrangler secret put STRIPE_WEBHOOK_SECRET
#   3) In the app: Settings -> Payments -> enable deposits + set the AUD amount.
