# Auto-deploy to Cloudflare on every push to main.
# Requires a repo secret named CLOUDFLARE_API_TOKEN (Workers edit permission).
# Account is read from wrangler.toml; the Worker's secrets already live on
# Cloudflare, so they don't need to be set here.
#
# Before the Worker ships, we VERIFY that production's D1 database already has
# every table and column the migrations define (scripts/check-remote-schema.mjs).
# Production migrations are applied manually/with approval (the migrations runner
# is not adopted in prod - see migrations/README.md), so this gate stops a deploy
# from racing ahead of its schema and shipping code that references a column that
# does not exist yet. If it fails, apply the outstanding migration to prod first,
# then re-run the deploy.
name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"  # node:sqlite (schema check) + wrangler >=4.x need Node 22

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests
        run: npm test

      - name: Prepare browser smoke database
        run: npm run qa:reset -- --worstcase

      - name: Start local Worker
        run: |
          nohup npx wrangler dev --port 8787 \
            --var ADMIN_PASSWORD:e2e-admin \
            --var ADMIN_TOKEN:e2e-token-for-browser-smoke-tests \
            --var MAIL_DRY_RUN:1 > /tmp/jdm-worker.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8787/login > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/jdm-worker.log
          exit 1

      - name: Run mobile browser smoke tests
        env:
          E2E_BASE_URL: http://127.0.0.1:8787
        run: |
          export PUPPETEER_EXECUTABLE_PATH="$(which google-chrome || which chromium || which chromium-browser)"
          npm run test:e2e

      - name: Verify production schema matches migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:check:remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
