# Auto-deploy to Cloudflare on every push to main.
# Requires a repo secret named CLOUDFLARE_API_TOKEN (Workers edit permission).
# Account is read from wrangler.toml; the Worker's secrets already live on
# Cloudflare, so they don't need to be set here.
name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
