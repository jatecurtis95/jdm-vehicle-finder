name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Never let two main-branch releases race each other. A running production
# release finishes before the next one starts, preserving deploy order.
concurrency:
  group: jdmfinder-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: 78a4648f57e3da163587fff349bf8b19

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run regression tests
        run: npm test

      - name: Prepare browser smoke database
        run: npm run qa:reset -- --worstcase

      - name: Start local Worker
        run: |
          nohup npx wrangler dev --port 8787 \
            --var ADMIN_PASSWORD:e2e-admin \
            --var ADMIN_TOKEN:e2e-token-for-browser-smoke-tests \
            --var MAIL_DRY_RUN:1 > /tmp/jdm-worker.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8787/login > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/jdm-worker.log
          exit 1

      - name: Run mobile browser smoke tests
        env:
          E2E_BASE_URL: http://127.0.0.1:8787
        run: |
          export PUPPETEER_EXECUTABLE_PATH="$(which google-chrome || which chromium || which chromium-browser)"
          npm run test:e2e

      - name: Verify production schema matches migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:check:remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 78a4648f57e3da163587fff349bf8b19
          command: deploy

      - name: Production smoke
        env:
          PROD_BASE_URL: https://jdmfinder.com.au
          PROD_SMOKE_ATTEMPTS: "8"
          PROD_SMOKE_RETRY_MS: "2500"
        run: npm run test:prod:smoke
