# Manual, approved-only: apply reviewed pending D1 migrations to PRODUCTION
# through wrangler's migration runner (`d1 migrations apply --remote`).
#
# Requires the one-off "Adopt D1 migration tracking" workflow to have run
# first - the guard step below refuses to continue while the d1_migrations
# bookkeeping table is missing or empty, because in that state the runner
# would try to re-apply already-live files and fail on "duplicate column"
# (see migrations/README.md). After applying, the same schema gate the deploy
# uses verifies production matches what the code expects.
#
# Trigger from the Actions tab ("Run workflow") or the API. Manual only, and
# only after the specific migration has been approved (migrations/README.md
# production safety rules).
name: Apply reviewed D1 migrations

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jdmfinder-production-database
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"  # wrangler >=4.x requires Node 22

      - name: Install dependencies
        run: npm ci

      - name: Guard - migration tracking must be adopted first
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if ! out=$(npx wrangler d1 execute jdm-vehicle-finder --remote --json \
                     --command "SELECT COUNT(*) AS n FROM d1_migrations" 2>&1); then
            echo "$out"
            echo "ERROR: d1_migrations is missing. Run the 'Adopt D1 migration tracking' workflow first."
            exit 1
          fi
          echo "$out"
          if ! echo "$out" | grep -qE '"n":\s*[1-9]'; then
            echo "ERROR: d1_migrations is empty. Run the 'Adopt D1 migration tracking' workflow first."
            exit 1
          fi

      - name: Show pending migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:migrate:list

      - name: Apply pending migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:migrate:remote

      - name: Verify production schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:check:remote
