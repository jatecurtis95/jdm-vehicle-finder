name: Apply reviewed D1 migrations

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jdmfinder-production-database
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: 78a4648f57e3da163587fff349bf8b19
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Show reviewed pending migrations
        run: npm run db:migrate:list

      - name: Apply pending migrations
        run: npm run db:migrate:remote

      - name: Verify production schema
        run: npm run db:check:remote
