# Manual one-off: load the July 2026 batch of manually-tracked customers and
# their searches into the PRODUCTION D1 database. The seed is idempotent (each
# INSERT is guarded by NOT EXISTS), so re-running is safe. Manual dispatch only.
name: Seed managed customers (2026-07)
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"  # wrangler >=4.x requires Node 22

      - name: Install dependencies
        run: npm install

      - name: Load seed + verify counts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -uo pipefail
          npx wrangler d1 execute jdm-vehicle-finder --remote \
            --file seed/import-managed-2026-07.sql
          echo "=== verifying imported counts ==="
          out=$(npx wrangler d1 execute jdm-vehicle-finder --remote --json --command \
            "SELECT (SELECT COUNT(*) FROM clients WHERE notes LIKE 'Imported from JDM tracking sheet%') AS clients, (SELECT COUNT(*) FROM wishlists w JOIN clients c ON c.id=w.client_id WHERE c.notes LIKE 'Imported from JDM tracking sheet%') AS searches")
          echo "$out"
          echo "$out" | grep -q '"clients": 16' || { echo "EXPECTED 16 clients"; exit 1; }
          echo "$out" | grep -q '"searches": 18' || { echo "EXPECTED 18 searches"; exit 1; }
          echo "VERIFIED: 16 imported customers, 18 searches."
